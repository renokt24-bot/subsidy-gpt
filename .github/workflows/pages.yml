name: GitHub Pages へ公開

# 静的サイト（リポジトリ直下の index.html）を GitHub Pages へデプロイします。
on:
  push:
    branches:
      - main
      - claude/brave-wozniak-mjpm43 # マージ前でも確認できるよう作業ブランチでも公開
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに制限
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # Pages を自動で有効化

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." # リポジトリ直下をそのまま公開

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
